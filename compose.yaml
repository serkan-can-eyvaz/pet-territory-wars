services:
  api:
    build:
      context: ./backend
      args:
        TARGET: api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      HTTP_PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set}?sslmode=disable"
      LOG_LEVEL: debug
      WALK_WORKER_CONCURRENCY: "2"
      OUTBOX_WORKER_CONCURRENCY: "1"
      HTTP_READ_TIMEOUT: 5s
      HTTP_WRITE_TIMEOUT: 10s
      HTTP_SHUTDOWN_TIMEOUT: 10s
    ports:
      - "8080:8080"

  walk-worker:
    build:
      context: ./backend
      args:
        TARGET: walk-worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      HTTP_PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set}?sslmode=disable"
      LOG_LEVEL: debug
      WALK_WORKER_CONCURRENCY: "2"
      OUTBOX_WORKER_CONCURRENCY: "1"
      HTTP_READ_TIMEOUT: 5s
      HTTP_WRITE_TIMEOUT: 10s
      HTTP_SHUTDOWN_TIMEOUT: 10s

  outbox-worker:
    build:
      context: ./backend
      args:
        TARGET: outbox-worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      HTTP_PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:?POSTGRES_USER must be set}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB must be set}?sslmode=disable"
      LOG_LEVEL: debug
      WALK_WORKER_CONCURRENCY: "2"
      OUTBOX_WORKER_CONCURRENCY: "1"
      HTTP_READ_TIMEOUT: 5s
      HTTP_WRITE_TIMEOUT: 10s
      HTTP_SHUTDOWN_TIMEOUT: 10s

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB must be set}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER must be set}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
