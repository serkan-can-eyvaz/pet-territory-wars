name: Backend CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false
      - run: go mod download
      - run: test -z "$(gofmt -l $(find . -type f -name '*.go'))"
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
