services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: pet_territory
      POSTGRES_USER: pet_app
      POSTGRES_PASSWORD: local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pet_territory_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pet_app -d pet_territory"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
      args:
        TARGET: api
    environment:
      APP_ENV: ${APP_ENV:-local}
      HTTP_PORT: ${HTTP_PORT:-8080}
      DATABASE_URL: "${DATABASE_URL:-postgres://pet_app:local_password@postgres:5432/pet_territory?sslmode=disable}"
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      WALK_WORKER_CONCURRENCY: ${WALK_WORKER_CONCURRENCY:-2}
      OUTBOX_WORKER_CONCURRENCY: ${OUTBOX_WORKER_CONCURRENCY:-1}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-5s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-10s}
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-10s}
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pet_territory_network
    restart: unless-stopped

  walk-worker:
    build:
      context: ../backend
      args:
        TARGET: walk-worker
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: "${DATABASE_URL:-postgres://pet_app:local_password@postgres:5432/pet_territory?sslmode=disable}"
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      WALK_WORKER_CONCURRENCY: ${WALK_WORKER_CONCURRENCY:-2}
      OUTBOX_WORKER_CONCURRENCY: ${OUTBOX_WORKER_CONCURRENCY:-1}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-5s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-10s}
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-10s}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pet_territory_network
    restart: unless-stopped

  outbox-worker:
    build:
      context: ../backend
      args:
        TARGET: outbox-worker
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: "${DATABASE_URL:-postgres://pet_app:local_password@postgres:5432/pet_territory?sslmode=disable}"
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      WALK_WORKER_CONCURRENCY: ${WALK_WORKER_CONCURRENCY:-2}
      OUTBOX_WORKER_CONCURRENCY: ${OUTBOX_WORKER_CONCURRENCY:-1}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-5s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-10s}
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-10s}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pet_territory_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  pet_territory_network:
